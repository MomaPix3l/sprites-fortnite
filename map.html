<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Fortnite Event Location Map</title><link rel="stylesheet" href="styles.css"></head>
<body data-page="map"><main class="map-page">
  <header class="map-header"><div><h1>Event Location Map</h1><p>Track Sprite chests, gold fishing holes, regular fishing holes, and future event items. Each season map keeps its own pins.</p></div><div class="button-row"><a class="btn secondary" href="index.html">Back to Sprite Tracker</a><button id="addPinModeBtn" class="btn">Add pin by clicking map</button><button id="toggleLabelsBtn" class="btn secondary">Hide labels</button></div></header>
  <section class="panel map-controls"><div class="field"><label>Season Map</label><select id="seasonSelect"></select></div><button id="newSeasonBtn" class="btn">Add season map</button><label class="btn" for="seasonImageFile">Upload map image</label><input id="seasonImageFile" type="file" accept="image/*" hidden><button id="deleteSeasonBtn" class="btn danger">Delete season</button><div id="mapHint" class="help">Click “Add pin” first</div><div id="typeFilters" class="chips"></div><div class="field"><label>Quality</label><select id="qualityFilter"><option value="all">All</option><option>Best</option><option>Good</option><option>Testing</option><option>Removed</option></select></div><div class="field"><label>Status</label><select id="confirmedFilter"><option value="all">All</option><option value="confirmed">Confirmed</option><option value="unconfirmed">Unconfirmed</option></select></div><button id="showAllMapBtn" class="btn secondary">Show all</button></section>
  <section class="map-layout">
    <div class="map-card"><div class="zoombar"><button id="zoomOutBtn" class="mini">−</button><input id="mapZoom" type="range" min="0.45" max="2.2" step="0.05" value="1"><button id="zoomInBtn" class="mini">+</button><button id="fitMapBtn" class="mini">Fit</button><span id="pinStats" class="pin-stats">0 pins</span></div><div id="mapScroll" class="map-scroll"><div id="mapStage" class="map-stage"><img id="seasonMap" class="season-map" src="assets/current-season-map.png" alt="Season map"><div id="pinLayer" class="pin-layer"></div></div></div></div>
    <aside class="side-card"><div class="tabs"><button id="pinTabBtn" class="btn active">Pin</button><button id="typeTabBtn" class="btn secondary">Types</button></div>
      <section id="pinEditorPanel"><h2>Add / Edit Location</h2><div class="form-grid"><div class="field full"><label>Name</label><input id="pinName" value="Sprite"></div><div class="field full"><label>Type</label><select id="pinType"></select></div><div class="field full"><label>Area / POI</label><input id="pinArea" placeholder="Heatwave Harbor, Sunken Shores..."></div><div class="field"><label>Quality</label><select id="pinQuality"><option>Best</option><option>Good</option><option>Testing</option><option>Removed</option></select></div><div class="field"><label>X %</label><input id="pinX" type="number" step="0.01"></div><div class="field"><label>Y %</label><input id="pinY" type="number" step="0.01"></div><label class="field"><span class="help">Confirmed</span><input id="pinConfirmed" type="checkbox"></label><div class="field full"><label>Notes / Sprite or item found</label><textarea id="pinNotes" rows="3" placeholder="Example: Gold Punk, Gummy Fire, route details..."></textarea></div><div class="field full"><label>Close-up screenshot</label><input id="pinCloseup" type="file" accept="image/*"><img id="closeupPreview" class="preview" alt="close-up preview"></div></div><div class="button-row"><button id="savePinBtn" class="btn">Save pin</button><button id="clearPinBtn" class="btn secondary">Clear</button><button id="deletePinBtn" class="btn danger">Delete</button></div><hr><div class="button-row"><button id="exportPinsBtn" class="btn secondary">Export Map JSON</button><label class="btn secondary" for="importPinsFile">Import Map JSON</label><input id="importPinsFile" type="file" accept="application/json" hidden><button id="resetMapBtn" class="btn danger">Reset map data</button></div><div id="mapDebug" class="debug"></div></section>
      <section id="typeEditorPanel" hidden><h2>Location Types</h2><div id="legend" class="legend"></div><h3>Create custom type</h3><div class="field"><label>Type name</label><input id="newTypeName" placeholder="Event chest, boss item..."></div><div class="field"><label>Color</label><input id="newTypeColor" type="color" value="#16f0d0"></div><div class="field"><label>Icon image</label><input id="newTypeIcon" type="file" accept="image/*"></div><label><input id="newTypeVisible" type="checkbox" checked> Visible by default</label><button id="addTypeBtn" class="btn">Add custom type</button><div id="typeList" class="type-list"></div></section>
    </aside>
  </section>
</main><script src="data.js"></script><script src="app.js"></script></body></html>
